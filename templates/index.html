<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoFlow AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --green: #7ceb7c; --bg: #0a0b10; --text: #f4f4f9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        h1 { font-family: 'Press Start 2P'; font-size: 1.2rem; color: var(--green); }
        .viewport { width: 100%; aspect-ratio: 1/1; background: #000; border: 2px solid #333; border-radius: 15px; position: relative; overflow: hidden; margin: 20px 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none; }
        .btn { background: var(--green); color: #000; border: none; padding: 15px 30px; font-family: 'Press Start 2P'; font-size: 0.7rem; border-radius: 10px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        #debug-console { background: #000; color: var(--green); font-family: 'JetBrains Mono'; font-size: 10px; padding: 10px; border: 1px solid #333; height: 60px; overflow-y: auto; text-align: left; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #161821; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .num { font-size: 2rem; font-family: 'JetBrains Mono'; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>ECO<span>FLOW</span> AI</h1>
    
    <div class="stats">
        <div class="stat-box">DRY: <div class="num" id="dry-count">0</div></div>
        <div class="stat-box">WET: <div class="num" id="wet-count">0</div></div>
    </div>

    <div class="viewport">
        <div id="placeholder" style="padding-top: 40%;">[ SYSTEM STANDBY ]</div>
        <video id="videoFeed" autoplay playsinline muted></video>
    </div>

    <button id="camera-btn" class="btn" onclick="initSystem()">INITIALIZE SYSTEM</button>
    <button class="btn" style="background:#444; color:#fff;" onclick="resetStats()">RESET DATA</button>
    
    <div id="debug-console">> Awaiting uplink...</div>
</div>

<script>
    let cameraActive = false;

    function log(msg) {
        document.getElementById('debug-console').innerHTML = "> " + msg;
    }

    async function initSystem() {
        const video = document.getElementById('videoFeed');
        const btn = document.getElementById('camera-btn');

        if (!cameraActive) {
            log("Requesting Camera...");
            
            // Standard constraints for mobile
            const constraints = {
                video: { facingMode: "environment", width: { ideal: 480 }, height: { ideal: 480 } },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Critical for iOS/Safari
                video.setAttribute("playsinline", true);
                video.play();

                document.getElementById('placeholder').classList.add('hidden');
                cameraActive = true;
                btn.innerText = "SYSTEM ONLINE";
                btn.style.background = "#444";
                log("Uplink Established. Scanning...");
                
                // Start AI Loop
                startScanning();
            } catch (err) {
                log("CRITICAL ERROR: " + err.name);
                alert("CAMERA BLOCKED: Please use HTTPS and allow camera access in site settings.");
            }
        }
    }

    async function startScanning() {
        if (!cameraActive) return;

        const video = document.getElementById('videoFeed');
        const canvas = document.createElement('canvas');
        canvas.width = 224;
        canvas.height = 224;
        const ctx = canvas.getContext('2d');

        // Draw current frame to canvas
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

        try {
            const response = await fetch('/process_frame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataUrl })
            });
            const result = await response.json();

            if (result.status === "success") {
                document.getElementById('dry-count').innerText = result.stats.dry;
                document.getElementById('wet-count').innerText = result.stats.wet;
            }
        } catch (e) {
            console.error("AI Sync failed");
        }

        setTimeout(startScanning, 1000);
    }

    async function resetStats() {
        try {
            const res = await fetch('/reset_stats');
            const data = await res.json();
            document.getElementById('dry-count').innerText = "0";
            document.getElementById('wet-count').innerText = "0";
            log("Stats Reset to Zero");
        } catch(e) { log("Reset Connection Error"); }
    }
</script>
</body>
</html>
